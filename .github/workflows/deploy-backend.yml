name: Deploy Backend to EC2
# ^ just a label, shows up in the Actions tab

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # ^ these three lines are GitHub pulling the values you stored as secrets
          #   and feeding them to the ssh-action — this is the whole "magic," just variable substitution
          script: |
            cd ~/uploadAura-S3wrapper
            git pull origin main
            cd backend
            npm install
            npm run build
            pm2 restart backend-api --update-env
